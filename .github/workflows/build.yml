# ChatGPT
name: Build and Push to Branch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare build branch content
        run: |
          rm -rf ../build-output
          mkdir ../build-output
          cp -r build/* ../build-output  # adjust build/ if needed

      - name: Switch to build branch (create if missing)
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/heads/build; then
            git checkout build
          else
            git checkout --orphan build
          fi

      - name: Replace branch contents
        run: |
          git rm -rf .
          cp -r ../build-output/* .
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update build branch ($(date -u))" || echo "No changes"

      - name: Push
        run: git push -f origin build
